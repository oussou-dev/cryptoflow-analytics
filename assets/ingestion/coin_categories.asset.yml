name: raw.coin_categories
type: ingestr
connection: duckdb-default

parameters:
    source_connection: duckdb-default
    source_table: 'seeds/coin_categories.csv'
    destination: duckdb

columns:
    - name: coin_id
      type: string
      description: "CoinGecko coin identifier"
      checks:
        - name: not_null
        - name: unique
    - name: category
      type: string
      description: "Primary category (DeFi, Meme, Layer 1...)"
      checks:
        - name: not_null
    - name: subcategory
      type: string
      description: "Subcategory for finer classification"
      checks:
        - name: not_null
